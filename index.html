<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flashcard Revision</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app">
    <header>
      <h1>Revision Flashcards</h1>

      <div class="row" style="justify-content: center;">
        <button id="scienceBtn" class="bigChoice" type="button">Science</button>
        <button id="communityBtn" class="bigChoice" type="button">Community</button>
      </div>

      <p class="hint" id="statusText">Choose a topic to begin.</p>

      <div class="row" style="margin-top:12px;">
        <button id="resetBtn" class="ghost" type="button" style="display:none;">Reset</button>
      </div>
    </header>

    <main id="mainArea" class="main-area" hidden>
      <div class="grid" id="cardGrid" aria-label="Flashcard grid"></div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
